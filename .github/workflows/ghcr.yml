name: Build Docker image and push to GHCR

on:
  push:
    # Build on every push to main...
    branches: [ "main" ]
    # ...and on every semver release tag.
    tags: [ 'v*.*.*' ]
  # Allow building any branch on demand (e.g. to test an image before merge).
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fieldpapers/fp-web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # Enable BuildKit for layer-cache export.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags: branch name, short sha, semver (with major/minor
      # aliases), and :latest on the default branch.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

services:
  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=fp
      - MYSQL_DATABASE=fieldpapers_development
      - MYSQL_USER=fieldpapers
      - MYSQL_PASSWORD=fieldpapers
    ports:
      - 3306:3306
  web:
    build:
      context: .
      target: development
    env_file: .env
    environment:
      - RAILS_ENV=development
      - RAILS_DEVELOPMENT_HOSTS=web
      - DATABASE_URL=mysql2://fieldpapers:fieldpapers@db/fieldpapers_development
      - TEST_DATABASE_URL=mysql2://fieldpapers:fieldpapers@db/fieldpapers_test
      - BASE_URL=http://web:3000
      - PERSIST=local
      - DISABLE_LOGIN_CONFIRMATIONS=true
      # local snapshot tiles won't render (fp-tiler v2 is Lambda-only, see below), but this
      # needs to be a real, publicly reachable tile server for map display to work at all
      - TILE_BASE_URL=https://tiles.fieldpapers.org
      - TASK_BASE_URL=http://tasks:8081
    hostname: fieldpapers
    ports:
      - 3000:3000
    volumes:
      - ./app:/app/app
      - ./config:/app/config
      - ./db:/app/db
      - ./lib:/app/lib
      - ./locale:/app/locale
      - ./public:/app/public
      - ./test:/app/test
  tasks:
    build: ../fp-tasks
    # The prod image runs as the "node" user, which cannot write to bind mount
    # volumes like ./public on the host when run under podman in rootless mode.
    # As a workaround, set user to root in dev mode.
    user: root
    env_file: .env
    environment:
      # this will cause generated URLs in the PDFs to look suspicious, but it will work
      - API_BASE_URL=http://web:3000/
      - NODE_ENV=production
      - PORT=8081
      - PERSIST=local
      - STATIC_PATH=/data
      - STATIC_URI_PREFIX=http://web:3000
    ports:
      - 8081:8081
    volumes:
      # rendered PDFs land in fp-web's public dir, served by the Rails app itself
      - ./public:/data
  # fp-tiler v2 is Lambda-only (no HTTP server mode), so it cannot run as a
  # compose service. Map tiles are pointed at the production tile server
  # (TILE_BASE_URL above) instead; locally-created snapshot tiles will not
  # render, which is a known limitation of this dev setup.
  # tiler:
  #   image: quay.io/fieldpapers/tiler:v0.2.0
  #   env_file: .env
  #   environment:
  #     - API_BASE_URL=http://web:3000/
  #     - NODE_ENV=production
  #     - PORT=8080
  #   ports:
  #     - 8080:8080
